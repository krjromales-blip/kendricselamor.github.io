
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krispy Kreme Hub</title>
<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:url('back.jpg') center/cover no-repeat fixed;
}
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
}
.container{
    position:relative;
    z-index:1;
    width:min(1000px,95%);
    text-align:center;
}
.logo{
    width:140px;
    margin-bottom:20px;
}
h1{
    color:white;
    font-size:48px;
    margin-bottom:10px;
}
p{
    color:#d1fae5;
    margin-bottom:35px;
    font-size:18px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}
.card{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:130px;
    border-radius:24px;
    text-decoration:none;
    color:white;
    font-size:22px;
    font-weight:700;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.25);
    transition:0.25s;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}
.card:hover{
    transform:translateY(-6px) scale(1.02);
    background:rgba(255,255,255,0.18);
}
.coming{
    opacity:0.7;
}
</style>
</head>
<body>
<div class="overlay"></div>

<div class="container">
    <img src="logo.png" class="logo">
    <h1>KRISPY KREME HUB</h1>
    <p>Select a workspace</p>

    <div class="grid">
        <a class="card" href="main-sheet.html">📋 Main Sheet</a>
        <a class="card" href="prod-plan.html">🕒 Prod Plan</a>
        <a class="card" href="manage-recipe.html">🛠️ Manage Recipe</a>
        <a class="card" href="wip-plan.html">📦 WIP Plan Cards</a>
        <a class="card" href="delivery-receipt.html">🚚 Delivery Receipt</a>
        <a class="card coming" href="sana-all.html">✨ Sana All</a>
    </div>
</div>
</body>
</html>
